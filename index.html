<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Fitness Pro 4.0</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #30D158; --bg: #000; --card: #1C1C1E; --text: #FFF; --secondary: #8E8E93; --danger: #FF453A; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; padding-bottom: 90px; }
        .page { display: none; padding: 20px; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .card { background: var(--card); padding: 18px; border-radius: 16px; margin-bottom: 15px; border: 1px solid #2C2C2E; }
        .main-btn { background: var(--primary); color: #000; border: none; padding: 16px; border-radius: 12px; width: 100%; font-weight: bold; font-size: 16px; margin-bottom: 10px; cursor: pointer; }
        .sec-btn { background: #2C2C2E; color: #FFF; border: none; padding: 14px; border-radius: 12px; width: 100%; margin-top: 5px; cursor: pointer; }
        input, select, textarea { width: 100%; background: #2C2C2E; border: 1px solid #3A3A3C; padding: 12px; border-radius: 10px; color: #fff; margin: 8px 0; font-size: 16px; }
        .nav { position: fixed; bottom: 0; width: 100%; background: rgba(28, 28, 30, 0.95); backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 15px 0 calc(10px + env(safe-area-inset-bottom)); border-top: 1px solid #3A3A3C; }
        .nav-item { background: none; border: none; color: var(--secondary); font-size: 11px; display: flex; flex-direction: column; align-items: center; }
        .nav-item.active { color: var(--primary); }
        /* Spezielles Styling für Last-Session Info */
        .last-val { font-size: 11px; color: var(--primary); display: block; margin-top: -5px; margin-bottom: 5px; font-weight: bold; }
        .set-row { display: grid; grid-template-columns: 70px 1fr 1fr; gap: 8px; align-items: center; margin-bottom: 12px; }
        .chart-container { position: relative; height: 200px; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="page-home" class="page active">
        <h1>Dashboard</h1>
        <button class="main-btn" onclick="nav('workout-select')">▶️ Training starten</button>
        <div class="card">
            <button class="sec-btn" onclick="nav('ex-lib')">💪 Übungen</button>
            <button class="sec-btn" onclick="nav('plan-mgmt')">📋 Pläne</button>
            <button class="sec-btn" onclick="nav('weight')">⚖️ Körpergewicht</button>
        </div>
    </div>

    <div id="page-weight" class="page">
        <button class="back-btn" onclick="nav('home')">← Zurück</button>
        <h2>Gewicht-Tracking</h2>
        <div class="card">
            <input type="date" id="wDate">
            <input type="number" id="wVal" step="0.1" placeholder="kg">
            <button class="main-btn" onclick="saveWeight()">Speichern</button>
        </div>
        <div class="card"><canvas id="weightChart"></canvas></div>
        <div id="weightList"></div>
    </div>

    <div id="page-workout-active" class="page">
        <h2 id="activeTitle">Workout</h2>
        <div id="activeContent"></div>
        <button class="main-btn" onclick="finishWorkout()">Session beenden</button>
    </div>

    <div id="page-analysis" class="page">
        <h1>Analyse</h1>
        <div class="card">
            <h3>Körpergewicht Trend</h3>
            <canvas id="weightChartSmall"></canvas>
        </div>
        <div id="exerciseAnalysisContent"></div>
        <h3>Verlauf</h3>
        <div id="historyLogs"></div>
    </div>

    <div id="page-ex-lib" class="page"><button onclick="nav('home')">←</button><h2>Übungen</h2><div id="exInput"></div><div id="exList"></div></div>
    <div id="page-plan-mgmt" class="page"><button onclick="nav('home')">←</button><h2>Pläne</h2><div id="planInput"></div><div id="planList"></div></div>
    <div id="page-workout-select" class="page"><button onclick="nav('home')">←</button><h2>Plan wählen</h2><div id="selectList"></div></div>

    <nav class="nav">
        <button class="nav-item active" onclick="nav('home')">🏠<br>Home</button>
        <button class="nav-item" onclick="nav('analysis')">📈<br>Analyse</button>
    </nav>

    <script>
        let db = JSON.parse(localStorage.getItem('myFitnessApp_v3')) || { ex: [], plans: [], logs: [], weight: [] };
        let charts = {};

        function save() { localStorage.setItem('myFitnessApp_v3', JSON.stringify(db)); }

        function nav(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-' + id).classList.add('active');
            if(id === 'weight') renderWeight();
            if(id === 'analysis') renderAnalysis();
            if(id === 'workout-select') renderPlanChoice();
            if(id === 'ex-lib') renderExLib();
            if(id === 'plan-mgmt') renderPlanMgmt();
        }

        // --- HILFE: LETZTE WERTE FINDEN ---
        function getLastSessionData(exId) {
            const sortedLogs = [...db.logs].sort((a,b) => new Date(b.date.split('.').reverse().join('-')) - new Date(a.date.split('.').reverse().join('-')));
            for(let log of sortedLogs) {
                const entry = log.exercises.find(e => e.exId == exId);
                if(entry) return entry.sets;
            }
            return null;
        }

        // --- TRAINING ---
        function startWorkout(planId) {
            const plan = db.plans.find(p => p.id == planId);
            document.getElementById('activeTitle').innerText = plan.name;
            const cont = document.getElementById('activeContent');
            cont.innerHTML = '';

            plan.exIds.forEach(id => {
                const ex = db.ex.find(e => e.id == id);
                const lastSets = getLastSessionData(id);
                
                let setHtml = '';
                [12, 10, 8].forEach((def, i) => {
                    const lastVal = lastSets && lastSets[i] ? `Letztes Mal: ${lastSets[i].weight}kg x ${lastSets[i].reps}` : 'Keine Daten';
                    setHtml += `
                        <div class="set-row">
                            <span>Satz ${i+1}</span>
                            <input type="number" placeholder="kg" class="w-in">
                            <input type="number" placeholder="${def}" value="${def}" class="r-in">
                        </div>
                        <span class="last-val">${lastVal}</span>
                    `;
                });

                cont.innerHTML += `<div class="card workout-card" data-id="${ex.id}"><h3>${ex.name}</h3>${setHtml}</div>`;
            });
            nav('workout-active');
        }

        // --- GEWICHT SORTIERT & GRAPH ---
        function renderWeight() {
            db.weight.sort((a,b) => new Date(a.date) - new Date(b.date));
            const ctx = document.getElementById('weightChart').getContext('2d');
            if(charts.weight) charts.weight.destroy();
            
            charts.weight = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: db.weight.map(w => new Date(w.date).toLocaleDateString()),
                    datasets: [{ label: 'kg', data: db.weight.map(w => w.val), borderColor: '#30D158', tension: 0.3 }]
                },
                options: { responsive: true, scales: { y: { beginAtZero: false } } }
            });

            document.getElementById('weightList').innerHTML = [...db.weight].reverse().map(w => `
                <div class="card" style="display:flex; justify-content:space-between">
                    <span>${new Date(w.date).toLocaleDateString()}</span> <strong>${w.val} kg</strong>
                </div>
            `).join('');
        }

        function saveWeight() {
            const val = document.getElementById('wVal').value;
            const date = document.getElementById('wDate').value;
            if(val && date) {
                db.weight.push({date, val: parseFloat(val)});
                save(); renderWeight();
            }
        }

        // --- ANALYSE (AKTIENKURVEN FÜR ÜBUNGEN) ---
        function renderAnalysis() {
            const cont = document.getElementById('exerciseAnalysisContent');
            cont.innerHTML = '<h3>Kraftverlauf Übungen</h3>';
            
            db.ex.forEach(ex => {
                const history = db.logs
                    .filter(l => l.exercises.some(e => e.exId == ex.id))
                    .map(l => {
                        const entry = l.exercises.find(e => e.exId == ex.id);
                        const maxWeight = Math.max(...entry.sets.map(s => parseFloat(s.weight) || 0));
                        return { date: l.date, weight: maxWeight };
                    })
                    .sort((a,b) => new Date(a.date.split('.').reverse().join('-')) - new Date(b.date.split('.').reverse().join('-')));

                if(history.length > 1) {
                    const canvasId = `chart-${ex.id}`;
                    cont.innerHTML += `<div class="card"><h4>${ex.name} (Max kg)</h4><canvas id="${canvasId}"></canvas></div>`;
                    setTimeout(() => {
                        new Chart(document.getElementById(canvasId), {
                            type: 'line',
                            data: {
                                labels: history.map(h => h.date),
                                datasets: [{ data: history.map(h => h.weight), borderColor: '#30D158', tension: 0.3 }]
                            },
                            options: { plugins: { legend: { display: false } } }
                        });
                    }, 100);
                }
            });
        }

        // Basis Funktionen für Navigation und Management (wie v3)
        function renderPlanChoice() {
            document.getElementById('selectList').innerHTML = db.plans.map(p => `<button class="main-btn" onclick="startWorkout('${p.id}')">${p.name}</button>`).join('');
        }
        function finishWorkout() {
            const date = new Date().toLocaleDateString('de-DE');
            const session = { date, exercises: [] };
            document.querySelectorAll('.workout-card').forEach(card => {
                const sets = [];
                card.querySelectorAll('.set-row').forEach(row => {
                    sets.push({ weight: row.querySelector('.w-in').value, reps: row.querySelector('.r-in').value });
                });
                session.exercises.push({ exId: card.dataset.id, sets });
            });
            db.logs.push(session); save(); nav('home');
        }

        window.onload = () => {
            document.getElementById('wDate').valueAsDate = new Date();
            nav('home');
        };
    </script>
</body>
</html>
