<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Fitness Pro 6.3</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #30D158; --bg: #000; --card: #1C1C1E; --text: #FFF; --secondary: #8E8E93; --danger: #FF453A; --accent: #0A84FF; --warning: #FF9F0A; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; padding-bottom: env(safe-area-inset-bottom); }
        .page { display: none; padding: 20px 20px 100px 20px; animation: fadeIn 0.2s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .card { background: var(--card); padding: 18px; border-radius: 16px; margin-bottom: 15px; border: 1px solid #2C2C2E; }
        .main-btn { background: var(--primary); color: #000; border: none; padding: 16px; border-radius: 12px; width: 100%; font-weight: bold; font-size: 16px; margin-bottom: 10px; cursor: pointer; }
        .sec-btn { background: #2C2C2E; color: #FFF; border: none; padding: 12px; border-radius: 10px; width: 100%; margin-top: 5px; cursor: pointer; }
        .danger-btn { background: var(--danger); color: white; border: none; padding: 8px 12px; border-radius: 8px; font-size: 12px; }
        .edit-btn { background: var(--accent); color: white; border: none; padding: 8px 12px; border-radius: 8px; font-size: 12px; }
        input, select, textarea { width: 100%; background: #2C2C2E; border: 1px solid #3A3A3C; padding: 12px; border-radius: 10px; color: #fff; margin: 8px 0; font-size: 16px; }
        .nav { position: fixed; bottom: 0; width: 100%; background: rgba(28, 28, 30, 0.95); backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 15px 0 calc(10px + env(safe-area-inset-bottom)); border-top: 1px solid #3A3A3C; z-index: 999; }
        .nav-item { background: none; border: none; color: var(--secondary); font-size: 11px; display: flex; flex-direction: column; align-items: center; }
        .nav-item.active { color: var(--primary); }
        .set-row { display: grid; grid-template-columns: 60px 1fr 1fr 40px; gap: 8px; align-items: center; margin-bottom: 8px; }
        .last-val { font-size: 11px; color: var(--primary); display: block; margin-top: -5px; margin-bottom: 10px; }
        .img-pre { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; background: #333; }
        .chart-wrap { height: 180px; width: 100%; margin-top: 10px; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

    <div id="page-home" class="page active">
        <h1>Fitness Pro</h1>
        <div id="resume-banner" class="card" style="display:none; border-color: var(--accent);">
            <p style="margin:0 0 10px 0">⚠️ Offenes Training gefunden!</p>
            <button class="main-btn" style="background: var(--accent)" onclick="resumeWorkout()">Fortsetzen</button>
            <button class="sec-btn" onclick="discardTemp()">Verwerfen</button>
        </div>
        <button class="main-btn" onclick="nav('workout-select')">▶️ Training starten</button>
        <div class="card">
            <h3>Verwaltung</h3>
            <button class="sec-btn" onclick="nav('ex-lib')">💪 Übungen & Fotos</button>
            <button class="sec-btn" onclick="nav('plan-mgmt')">📋 Trainingspläne</button>
            <button class="sec-btn" onclick="nav('weight')">⚖️ Körpergewicht</button>
            <button class="sec-btn" onclick="exportCSV()">📤 Apple Health Export (CSV)</button>
        </div>
    </div>

    <div id="page-workout-active" class="page">
        <h2 id="activeTitle">Workout</h2>
        <div id="activeContent"></div>
        <div class="card" style="border-style: dashed; border-color: var(--secondary);">
            <select id="spontSelect"><option value="">Übung wählen...</option></select>
            <button class="sec-btn" onclick="addSpontEx()">+ Hinzufügen</button>
            <hr style="border:0; border-top:1px solid #333; margin: 15px 0;">
            <button class="sec-btn" style="color: var(--warning)" onclick="showQuickAddEx()">+ Neue Übung erstellen</button>
        </div>
        <button class="main-btn" onclick="finishWorkout()" style="margin-top: 20px;">✅ Training beenden</button>
    </div>

    <div id="page-analysis" class="page">
        <h1>Analyse</h1>
        <div id="analyticsDashboard"></div>
        <h3 style="margin-top: 30px;">Verlauf</h3>
        <div id="historyLogs"></div>
    </div>

    <div id="page-weight" class="page">
        <button class="sec-btn" onclick="nav('home')">← Zurück</button>
        <h2 id="weightFormTitle">Gewicht tracken</h2>
        <div class="card">
            <input type="date" id="wD">
            <input type="number" id="wV" step="0.1" placeholder="kg">
            <button class="main-btn" id="weightSaveBtn" onclick="saveWeight()">Speichern</button>
            <button class="sec-btn" id="weightCancelBtn" style="display:none" onclick="resetWeightForm()">Abbrechen</button>
        </div>
        <div id="wList"></div>
    </div>

    <div id="page-ex-lib" class="page"><button class="sec-btn" onclick="nav('home')">←</button><h2 id="exFormTitle">Neue Übung</h2><div class="card"><input id="exN" placeholder="Name"><select id="exG"><option>Brust</option><option>Rücken</option><option>Beine</option><option>Schultern</option><option>Bizeps</option><option>Trizeps</option><option>Bauch</option></select><input type="file" id="exF" accept="image/*"><button class="main-btn" id="exSaveBtn" onclick="addEx()">Speichern</button><button class="sec-btn" id="exCancelBtn" style="display:none" onclick="resetExForm()">Abbrechen</button></div><div id="exL"></div></div>
    <div id="page-plan-mgmt" class="page"><button class="sec-btn" onclick="nav('home')">←</button><h2 id="plFormTitle">Neuer Plan</h2><div class="card"><input id="plN" placeholder="Plan Name"><div id="plPick" style="max-height: 200px; overflow-y: auto; margin-bottom: 10px;"></div><button class="main-btn" id="plSaveBtn" onclick="savePl()">Speichern</button><button class="sec-btn" id="plCancelBtn" style="display:none" onclick="resetPlForm()">Abbrechen</button></div><div id="plL"></div></div>
    <div id="page-workout-select" class="page"><button class="sec-btn" onclick="nav('home')">←</button><h2>Start</h2><button class="main-btn" style="background: var(--warning); color: #000;" onclick="initFreeWorkout()">⚡ Freies Training</button><div id="selL" style="margin-top:15px"></div></div>

    <nav class="nav">
        <button class="nav-item" onclick="nav('home')">🏠<br>Home</button>
        <button class="nav-item" onclick="nav('analysis')">📈<br>Analyse</button>
    </nav>

    <script>
        let db = JSON.parse(localStorage.getItem('myFitnessApp_v3')) || { ex: [], plans: [], logs: [], weight: [] };
        let editingLogIndex = null;
        let editingExId = null;
        let editingPlanId = null;
        let editingWeightIndex = null;

        function save() { localStorage.setItem('myFitnessApp_v3', JSON.stringify(db)); }

        function nav(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-' + id).classList.add('active');
            if(id === 'home') checkTemp();
            if(id === 'analysis') renderAnalysis();
            if(id === 'weight') renderWeight();
            if(id === 'ex-lib') renderExLib();
            if(id === 'plan-mgmt') renderPlanMgmt();
            if(id === 'workout-select') renderPlanChoice();
        }

        // --- KORRIGIERTE LOGIK: LETZTE SESSION FINDEN ---
        function getLastSession(exId) {
            // Finde alle Trainings, die diese Übung enthalten
            const entries = db.logs.filter(l => l.exercises.some(e => e.exId == exId));
            if (entries.length === 0) return null;

            // Sortiere nach Datum (Neuestes zuerst)
            entries.sort((a, b) => {
                const dA = new Date(a.date.split('.').reverse().join('-'));
                const dB = new Date(b.date.split('.').reverse().join('-'));
                return dB - dA;
            });

            // Gib die Sets des aktuellsten Trainings zurück
            return entries[0].exercises.find(e => e.exId == exId).sets;
        }

        // --- ANALYSE & CHARTS ---
        function renderAnalysis() {
            const dashboard = document.getElementById('analyticsDashboard');
            dashboard.innerHTML = '';
            
            if(db.weight.length > 1) {
                const wData = db.weight.map(w => ({ x: w.date, y: parseFloat(w.val) })).sort((a,b) => new Date(a.x) - new Date(b.x));
                createStockChart(dashboard, "Körpergewicht (kg)", wData, "#0A84FF");
            }

            db.ex.forEach(ex => {
                const history = db.logs
                    .filter(l => l.exercises.some(e => e.exId == ex.id))
                    .map(l => {
                        const entry = l.exercises.find(e => e.exId == ex.id);
                        const validWeights = entry.sets.map(s => parseFloat(s.weight)).filter(w => !isNaN(w) && w > 0);
                        if(validWeights.length === 0) return null;
                        return { x: l.date.split('.').reverse().join('-'), y: Math.max(...validWeights) };
                    })
                    .filter(h => h !== null)
                    .sort((a,b) => new Date(a.x) - new Date(b.x));

                if(history.length > 1) {
                    createStockChart(dashboard, ex.name, history, "#30D158");
                }
            });

            db.logs.sort((a,b) => new Date(b.date.split('.').reverse().join('-')) - new Date(a.date.split('.').reverse().join('-')));
            document.getElementById('historyLogs').innerHTML = db.logs.map((log, i) => `
                <div class="card flex-between">
                    <div><strong>${log.date}</strong><br><small style="color:var(--secondary)">${log.exercises.length} Übungen</small></div>
                    <div><button class="edit-btn" onclick="editPastLog(${i})">Edit</button> <button class="danger-btn" onclick="deleteLog(${i})">X</button></div>
                </div>
            `).join('');
        }

        function createStockChart(container, title, dataPoints, color) {
            const wrap = document.createElement('div');
            wrap.className = 'card';
            wrap.innerHTML = `<h4 style="margin:0 0 10px 0">${title}</h4><div class="chart-wrap"><canvas></canvas></div>`;
            container.appendChild(wrap);
            const ctx = wrap.querySelector('canvas').getContext('2d');
            const gradient = ctx.createLinearGradient(0, 0, 0, 180);
            gradient.addColorStop(0, color + '66'); gradient.addColorStop(1, color + '00');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: dataPoints.map(d => new Date(d.x).toLocaleDateString('de-DE', {day:'2-digit', month:'2-digit'})),
                    datasets: [{ data: dataPoints.map(d => d.y), borderColor: color, borderWidth: 3, pointRadius: 0, fill: true, backgroundColor: gradient, tension: 0.4 }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { grid: { display: false }, ticks: { color: '#8E8E93', font: { size: 10 } } }, y: { grid: { color: '#2C2C2E' }, ticks: { color: '#8E8E93', font: { size: 10 } }, beginAtZero: false } } }
            });
        }

        // --- GEWICHT EDIT/DELETE ---
        function saveWeight() {
            const date = document.getElementById('wD').value; const val = document.getElementById('wV').value;
            if(!date || !val) return;
            if(editingWeightIndex !== null) db.weight[editingWeightIndex] = { date, val };
            else db.weight.push({ date, val });
            save(); resetWeightForm(); renderWeight();
        }
        function editWeight(index) {
            editingWeightIndex = index; const entry = db.weight[index];
            document.getElementById('wD').value = entry.date; document.getElementById('wV').value = entry.val;
            document.getElementById('weightFormTitle').innerText = "Eintrag korrigieren";
            document.getElementById('weightSaveBtn').innerText = "Update";
            document.getElementById('weightCancelBtn').style.display = "block";
        }
        function deleteWeight(index) { if(confirm("Löschen?")) { db.weight.splice(index, 1); save(); renderWeight(); } }
        function resetWeightForm() { editingWeightIndex = null; document.getElementById('wD').value = ''; document.getElementById('wV').value = ''; document.getElementById('weightFormTitle').innerText = "Gewicht tracken"; document.getElementById('weightSaveBtn').innerText = "Speichern"; document.getElementById('weightCancelBtn').style.display = "none"; }
        function renderWeight() {
            db.weight.sort((a,b) => new Date(b.date) - new Date(a.date));
            document.getElementById('wList').innerHTML = db.weight.map((w, i) => `
                <div class="card flex-between">
                    <div><span>${new Date(w.date).toLocaleDateString('de-DE')}</span>: <strong>${w.val} kg</strong></div>
                    <div><button class="edit-btn" onclick="editWeight(${i})">Edit</button> <button class="danger-btn" onclick="deleteWeight(${i})">X</button></div>
                </div>`).join('');
        }

        // --- WORKOUT ENGINE ---
        function renderExCard(exObj) {
            const exBase = db.ex.find(e => e.id == exObj.id); if(!exBase) return;
            const lastSets = getLastSession(exObj.id); 
            const div = document.createElement('div'); div.className = 'card workout-card'; div.dataset.id = exObj.id;
            let sHtml = `<div class="s-wrap">`;
            exObj.sets.forEach((s, i) => {
                // Zeige Gewicht UND Wiederholungen vom letzten Mal
                const lStr = (lastSets && lastSets[i]) ? `L: ${lastSets[i].weight}kg x ${lastSets[i].reps}` : (lastSets && lastSets[0] ? `L: ${lastSets[0].weight}kg` : '-');
                sHtml += `<div class="set-row"><span style="font-size:10px">S${i+1}</span><input type="number" value="${s.w}" placeholder="kg" class="w-in" oninput="autosave()"><input type="number" value="${s.r}" placeholder="R" class="r-in" oninput="autosave()"><button class="danger-btn" style="padding:4px" onclick="this.parentElement.remove(); autosave();">X</button></div><span class="last-val">${lStr}</span>`;
            });
            div.innerHTML = `<div style="display:flex; gap:10px; align-items:center">${exBase.img ? `<img src="${exBase.img}" class="img-pre">` : '<div class="img-pre"></div>'}<strong>${exBase.name}</strong></div>${sHtml}</div><button class="sec-btn" onclick="addSetUI(this)">+ Satz</button><textarea class="n-in" placeholder="Notiz..." oninput="autosave()">${exObj.note || ''}</textarea>`;
            document.getElementById('activeContent').appendChild(div);
        }

        function exportCSV() {
            let csv = "Datum,Typ,Name,Wert,Einheit,Notiz\n";
            db.weight.forEach(w => csv += `${w.date},Körpergewicht,Körpergewicht,${w.val},kg,\n`);
            db.logs.forEach(l => l.exercises.forEach(e => {
                const exName = db.ex.find(x => x.id == e.exId)?.name || "Ex";
                const maxW = Math.max(...e.sets.map(s => s.weight));
                csv += `${l.date.split('.').reverse().join('-')},Krafttraining,${exName},${maxW},kg,"${e.note || ''}"\n`;
            }));
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a"); link.setAttribute("href", url); link.setAttribute("download", `FitnessPro_Export.csv`); link.click();
        }

        // --- BASICS ---
        async function addEx() {
            const n = document.getElementById('exN').value; const g = document.getElementById('exG').value; const f = document.getElementById('exF').files[0];
            if(!n) return; let img = editingExId ? db.ex.find(e => e.id == editingExId).img : null;
            if(f) img = await compress(f);
            if(editingExId) { const idx = db.ex.findIndex(e => e.id == editingExId); db.ex[idx] = { ...db.ex[idx], name:n, group:g, img }; }
            else db.ex.push({ id: Date.now(), name:n, group:g, img });
            save(); resetExForm(); renderExLib();
        }
        function editEx(id) { editingExId = id; const ex = db.ex.find(e => e.id == id); document.getElementById('exN').value = ex.name; document.getElementById('exG').value = ex.group; document.getElementById('exFormTitle').innerText = "Edit"; document.getElementById('exSaveBtn').innerText = "Update"; document.getElementById('exCancelBtn').style.display = "block"; window.scrollTo(0,0); }
        function resetExForm() { editingExId = null; document.getElementById('exN').value = ''; document.getElementById('exFormTitle').innerText = "Neu"; document.getElementById('exSaveBtn').innerText = "Speichern"; document.getElementById('exCancelBtn').style.display = "none"; }
        function renderExLib() { document.getElementById('exL').innerHTML = db.ex.map(e => `<div class="card flex-between"><div style="display:flex; gap:10px; align-items:center">${e.img ? `<img src="${e.img}" class="img-pre">` : '<div class="img-pre"></div>'}<div><strong>${e.name}</strong></div></div><div><button class="edit-btn" onclick="editEx(${e.id})">Edit</button> <button class="danger-btn" onclick="deleteEx(${e.id})">X</button></div></div>`).join(''); }
        function deleteEx(id) { if(confirm("Löschen?")) { db.ex = db.ex.filter(e => e.id != id); save(); renderExLib(); } }
        function renderPlanMgmt() {
            document.getElementById('plPick').innerHTML = db.ex.map(e => `<div style="padding: 5px 0"><input type="checkbox" value="${e.id}" class="p-ck"> ${e.name}</div>`).join('');
            document.getElementById('plL').innerHTML = db.plans.map(p => `<div class="card flex-between"><div><strong>${p.name}</strong></div><div><button class="edit-btn" onclick="editPl(${p.id})">Edit</button> <button class="danger-btn" onclick="deletePl(${p.id})">X</button></div></div>`).join('');
        }
        function savePl() {
            const n = document.getElementById('plN').value; const ids = Array.from(document.querySelectorAll('.p-ck:checked')).map(c => c.value);
            if(!n || ids.length === 0) return;
            if(editingPlanId) { const idx = db.plans.findIndex(p => p.id == editingPlanId); db.plans[idx] = { ...db.plans[idx], name:n, exIds: ids }; }
            else db.plans.push({ id: Date.now(), name:n, exIds: ids });
            save(); resetPlForm(); renderPlanMgmt();
        }
        function editPl(id) { editingPlanId = id; const pl = db.plans.find(p => p.id == id); document.getElementById('plN').value = pl.name; document.querySelectorAll('.p-ck').forEach(ck => ck.checked = pl.exIds.includes(ck.value)); document.getElementById('plFormTitle').innerText = "Edit"; document.getElementById('plSaveBtn').innerText = "Update"; document.getElementById('plCancelBtn').style.display = "block"; window.scrollTo(0,0); }
        function resetPlForm() { editingPlanId = null; document.getElementById('plN').value = ''; document.querySelectorAll('.p-ck').forEach(ck => ck.checked = false); document.getElementById('plFormTitle').innerText = "Neu"; document.getElementById('plSaveBtn').innerText = "Speichern"; document.getElementById('plCancelBtn').style.display = "none"; }
        function deletePl(id) { if(confirm("Löschen?")) { db.plans = db.plans.filter(p => p.id != id); save(); renderPlanMgmt(); } }
        function initFreeWorkout() { editingLogIndex = null; startWorkoutLogic("Freies Training", []); }
        function showQuickAddEx() { const n = prompt("Name:"); if(!n) return; const newEx = { id: Date.now(), name: n, group: "Andere", img: null }; db.ex.push(newEx); save(); renderExCard({ id: newEx.id, sets: [{w:'', r:'10'}], note: '' }); document.getElementById('spontSelect').innerHTML += `<option value="${newEx.id}">${newEx.name}</option>`; autosave(); }
        function renderPlanChoice() { document.getElementById('selL').innerHTML = db.plans.map(p => `<button class="main-btn" onclick="initNewWorkout('${p.id}')">${p.name}</button>`).join(''); }
        function initNewWorkout(planId) { editingLogIndex = null; const plan = db.plans.find(p => p.id == planId); const exData = plan.exIds.map(id => ({ id: id, sets: [{w:'', r:'12'},{w:'', r:'10'},{w:'', r:'8'}], note: '' })); startWorkoutLogic(plan.name, exData); }
        function startWorkoutLogic(title, exercises) { document.getElementById('activeTitle').innerText = title; document.getElementById('activeContent').innerHTML = ''; document.getElementById('spontSelect').innerHTML = '<option value="">Wählen...</option>' + db.ex.map(e => `<option value="${e.id}">${e.name}</option>`).join(''); exercises.forEach(exObj => renderExCard(exObj)); nav('workout-active'); }
        function addSetUI(btn) { const wrap = btn.parentElement.querySelector('.s-wrap'); const num = wrap.querySelectorAll('.set-row').length + 1; wrap.insertAdjacentHTML('beforeend', `<div class="set-row"><span style="font-size:10px">S${num}</span><input type="number" class="w-in" oninput="autosave()"><input type="number" value="8" class="r-in" oninput="autosave()"><button class="danger-btn" style="padding:4px" onclick="this.parentElement.remove(); autosave();">X</button></div>`); autosave(); }
        function addSpontEx() { const id = document.getElementById('spontSelect').value; if(id) renderExCard({ id: id, sets: [{w:'', r:'10'}], note:'' }); autosave(); }
        function finishWorkout() {
            const logs = []; document.querySelectorAll('.workout-card').forEach(card => {
                const sets = []; card.querySelectorAll('.set-row').forEach(row => { const w = row.querySelector('.w-in').value; const r = row.querySelector('.r-in').value; if(w && r) sets.push({ weight: w, reps: r }); });
                if(sets.length > 0) logs.push({ exId: card.dataset.id, sets, note: card.querySelector('.n-in').value });
            });
            if(logs.length === 0) return alert("Keine Werte!");
            const finalData = { date: editingLogIndex !== null ? db.logs[editingLogIndex].date : new Date().toLocaleDateString('de-DE'), exercises: logs };
            if(editingLogIndex !== null) db.logs[editingLogIndex] = finalData; else db.logs.push(finalData);
            save(); discardTemp(); nav('home');
        }
        function editPastLog(index) { editingLogIndex = index; const log = db.logs[index]; const exercises = log.exercises.map(e => ({ id: e.exId, sets: e.sets.map(s => ({ w: s.weight, r: s.reps })), note: e.note })); startWorkoutLogic("Edit: " + log.date, exercises); }
        function deleteLog(i) { if(confirm("Löschen?")) { db.logs.splice(i,1); save(); renderAnalysis(); } }
        function autosave() {
            const data = { title: document.getElementById('activeTitle').innerText, exercises: [] };
            document.querySelectorAll('.workout-card').forEach(card => {
                const sets = []; card.querySelectorAll('.set-row').forEach(row => { sets.push({ w: row.querySelector('.w-in').value, r: row.querySelector('.r-in').value }); });
                data.exercises.push({ id: card.dataset.id, sets, note: card.querySelector('.n-in').value });
            });
            localStorage.setItem('activeSession_temp', JSON.stringify(data));
        }
        function checkTemp() { const t = localStorage.getItem('activeSession_temp'); document.getElementById('resume-banner').style.display = t ? 'block' : 'none'; }
        function resumeWorkout() { const t = JSON.parse(localStorage.getItem('activeSession_temp')); if(t) startWorkoutLogic(t.title, t.exercises); }
        function discardTemp() { localStorage.removeItem('activeSession_temp'); checkTemp(); }
        function compress(f) { return new Promise(r => { const reader = new FileReader(); reader.onload = (e) => { const img = new Image(); img.onload = () => { const canvas = document.createElement('canvas'); canvas.width = 300; canvas.height = 300; canvas.getContext('2d').drawImage(img,0,0,300,300); r(canvas.toDataURL('image/jpeg',0.7)); }; img.src = e.target.result; }; reader.readAsDataURL(f); }); }

        window.onload = () => { nav('home'); };
    </script>
</body>
</html>
