<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>My Fitness App</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root { 
            --primary: #30D158; /* Apple Health Grün */
            --bg: #000000; 
            --card: #1C1C1E; 
            --text: #FFFFFF; 
            --secondary: #8E8E93; 
            --danger: #FF453A; 
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; padding: env(safe-area-inset-top) 0 calc(80px + env(safe-area-inset-bottom)) 0; }
        
        .page { display: none; padding: 20px; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        h1, h2, h3 { margin-top: 0; margin-bottom: 15px; font-weight: 700; letter-spacing: -0.5px; }
        .card { background: var(--card); padding: 18px; border-radius: 16px; margin-bottom: 15px; border: 1px solid #2C2C2E; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        
        /* Buttons */
        .main-btn { background: var(--primary); color: #000; border: none; padding: 16px; border-radius: 12px; width: 100%; font-weight: bold; font-size: 16px; margin-bottom: 10px; cursor: pointer; }
        .sec-btn { background: #2C2C2E; color: #FFF; border: none; padding: 14px; border-radius: 12px; width: 100%; margin-top: 5px; font-size: 15px; cursor: pointer; }
        .danger-btn { background: var(--danger); color: white; border: none; padding: 8px 12px; border-radius: 8px; font-size: 12px; font-weight: bold; }
        .back-btn { color: var(--primary); background: none; border: none; font-size: 16px; margin-bottom: 20px; padding: 0; font-weight: 600; cursor: pointer; }

        /* Inputs */
        input, select, textarea { width: 100%; background: #2C2C2E; border: 1px solid #3A3A3C; padding: 14px; border-radius: 12px; color: #fff; margin: 8px 0 16px 0; font-size: 16px; }
        textarea { resize: none; height: 80px; }
        label { font-size: 12px; color: var(--secondary); text-transform: uppercase; font-weight: 600; padding-left: 5px; }

        /* Listen & Layouts */
        .flex-row { display: flex; align-items: center; justify-content: space-between; gap: 15px; }
        .img-preview { width: 60px; height: 60px; border-radius: 10px; object-fit: cover; background: #333; flex-shrink: 0; }
        .ex-list-item { padding: 12px 0; border-bottom: 1px solid #2C2C2E; }
        .ex-list-item:last-child { border-bottom: none; }

        /* Workout View */
        .set-row { display: grid; grid-template-columns: 80px 1fr 1fr; gap: 10px; align-items: center; margin-bottom: 8px; }
        .set-label { font-size: 12px; color: var(--secondary); font-weight: bold; }
        .w-input, .r-input { margin: 0; text-align: center; font-size: 18px; font-weight: bold; }
        .spontaneous-box { border-top: 1px solid #3A3A3C; padding-top: 20px; margin-top: 20px; }

        /* Stats Bar */
        .stat-bar-bg { background: #333; height: 8px; border-radius: 4px; width: 100%; margin-top: 5px; overflow: hidden; }
        .stat-bar-fill { background: var(--primary); height: 100%; border-radius: 4px; }

        /* Navigation */
        .nav { position: fixed; bottom: 0; width: 100%; background: rgba(28, 28, 30, 0.95); backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 15px 0 calc(15px + env(safe-area-inset-bottom)) 0; border-top: 1px solid #3A3A3C; z-index: 1000; }
        .nav-item { background: none; border: none; color: var(--secondary); font-size: 11px; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .nav-item.active { color: var(--primary); }
        .nav-icon { font-size: 22px; }
    </style>
</head>
<body>

    <div id="page-home" class="page active">
        <h1>Dashboard</h1>
        <button class="main-btn" onclick="nav('workout-select')" style="padding: 20px; font-size: 18px;">▶️ Training starten</button>
        
        <div class="card" style="margin-top: 20px;">
            <h3>Verwaltung</h3>
            <button class="sec-btn" onclick="nav('ex-lib')">💪 Übungen Bibliothek</button>
            <button class="sec-btn" onclick="nav('plan-mgmt')">📋 Trainingspläne</button>
            <button class="sec-btn" onclick="nav('weight')">⚖️ Körpergewicht</button>
        </div>
    </div>

    <div id="page-ex-lib" class="page">
        <button class="back-btn" onclick="nav('home')">← Zurück</button>
        <h2>Neue Übung</h2>
        <div class="card">
            <label>Name</label>
            <input type="text" id="newExName" placeholder="z.B. Bankdrücken">
            <label>Muskelgruppe</label>
            <select id="newExGroup">
                <option value="Brust">Brust</option><option value="Rücken">Rücken</option>
                <option value="Beine">Beine</option><option value="Schultern">Schultern</option>
                <option value="Bizeps">Bizeps</option><option value="Trizeps">Trizeps</option>
                <option value="Bauch">Bauch</option>
            </select>
            <label>Foto (Kamera/Galerie)</label>
            <input type="file" id="newExPhoto" accept="image/*" capture="environment">
            <button class="main-btn" onclick="addExercise()">Speichern</button>
        </div>
        <h3>Gespeicherte Übungen</h3>
        <div id="exListContainer" class="card" style="padding: 0 15px;"></div>
    </div>

    <div id="page-plan-mgmt" class="page">
        <button class="back-btn" onclick="nav('home')">← Zurück</button>
        <h2>Neuen Plan erstellen</h2>
        <div class="card">
            <label>Plan Name</label>
            <input type="text" id="newPlanName" placeholder="z.B. Push Day">
            <label>Übungen auswählen</label>
            <div id="exPickerList" style="margin-bottom: 15px;"></div>
            <button class="main-btn" onclick="savePlan()">Plan Speichern</button>
        </div>
        <h3>Meine Pläne</h3>
        <div id="planListContainer"></div>
    </div>

    <div id="page-workout-select" class="page">
        <button class="back-btn" onclick="nav('home')">← Zurück</button>
        <h2>Welchen Plan trainierst du heute?</h2>
        <div id="startPlanList"></div>
    </div>

    <div id="page-workout-active" class="page">
        <h2 id="currentPlanTitle">Workout</h2>
        <div id="activeExercises"></div>
        
        <div class="card spontaneous-box">
            <label>Spontane Übung hinzufügen</label>
            <select id="spontaneousSelect"></select>
            <button class="sec-btn" onclick="addSpontaneousEx()">➕ Hinzufügen</button>
        </div>

        <button class="main-btn" onclick="finishWorkout()" style="margin-top: 30px; padding: 20px;">✅ Session abschließen</button>
    </div>

    <div id="page-analysis" class="page">
        <h1>Analyse</h1>
        <div class="card" id="analysisStats"></div>
        <h3>Vergangene Trainings</h3>
        <div id="logHistory"></div>
    </div>

    <div id="page-weight" class="page">
        <button class="back-btn" onclick="nav('home')">← Zurück</button>
        <h2>Körpergewicht</h2>
        <div class="card">
            <label>Datum</label>
            <input type="date" id="weightDate">
            <label>Gewicht (kg)</label>
            <input type="number" id="weightVal" step="0.1" placeholder="z.B. 85.5">
            <button class="main-btn" onclick="saveWeight()">Eintragen</button>
        </div>
        <div id="weightList"></div>
    </div>

    <nav class="nav">
        <button class="nav-item active" onclick="nav('home')"><span class="nav-icon">🏠</span>Home</button>
        <button class="nav-item" onclick="nav('analysis')"><span class="nav-icon">📈</span>Analyse</button>
    </nav>

    <script>
        // DATENBANK INITIALISIEREN
        let db = JSON.parse(localStorage.getItem('myFitnessApp_v3')) || { ex: [], plans: [], logs: [], weight: [] };
        function saveDB() { localStorage.setItem('myFitnessApp_v3', JSON.stringify(db)); }

        // NAVIGATION
        function nav(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
            
            document.getElementById('page-' + id).classList.add('active');
            
            // Aktiviere Menu Button wenn zutreffend
            if(id === 'home' || id === 'analysis') {
                event.currentTarget.classList.add('active');
            }

            // Lade spezifische Daten für die Seiten
            if(id === 'ex-lib') renderEx();
            if(id === 'plan-mgmt') renderPlanMgmt();
            if(id === 'workout-select') renderStartPlans();
            if(id === 'analysis') renderAnalysis();
            if(id === 'weight') renderWeight();
        }

        // --- 1. ÜBUNGEN VERWALTEN & BILDER KOMPRIMIEREN ---
        async function addExercise() {
            const name = document.getElementById('newExName').value;
            const group = document.getElementById('newExGroup').value;
            const file = document.getElementById('newExPhoto').files[0];
            let imgData = null;

            if(!name) return alert("Bitte gib einen Namen ein.");

            if(file) { imgData = await compressImage(file); }

            db.ex.push({ id: Date.now(), name, group, img: imgData });
            saveDB(); renderEx();
            
            // Formular leeren
            document.getElementById('newExName').value = '';
            document.getElementById('newExPhoto').value = '';
        }

        function compressImage(file) {
            return new Promise(resolve => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 400; // Perfekte Größe für Thumbnails auf dem iPhone
                        let w = img.width, h = img.height;
                        if (w > h) { if (w > MAX_WIDTH) { h *= MAX_WIDTH / w; w = MAX_WIDTH; } }
                        else { if (h > MAX_WIDTH) { w *= MAX_WIDTH / h; h = MAX_WIDTH; } }
                        canvas.width = w; canvas.height = h;
                        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                        resolve(canvas.toDataURL('image/jpeg', 0.6)); // 60% Qualität reicht völlig
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        function renderEx() {
            const container = document.getElementById('exListContainer');
            if(db.ex.length === 0) { container.innerHTML = "<p style='padding: 10px 0; color: #888;'>Noch keine Übungen vorhanden.</p>"; return; }
            
            container.innerHTML = db.ex.map((e, i) => `
                <div class="flex-row ex-list-item">
                    <img src="${e.img || 'data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs='}" class="img-preview" style="${!e.img ? 'display:none;' : ''}">
                    <div style="flex:1"><strong>${e.name}</strong><br><small style="color:var(--secondary)">${e.group}</small></div>
                    <button class="danger-btn" onclick="deleteEx(${i})">X</button>
                </div>
            `).join('');
        }
        function deleteEx(i) { if(confirm("Übung wirklich löschen?")) { db.ex.splice(i, 1); saveDB(); renderEx(); } }

        // --- 2. PLÄNE VERWALTEN ---
        function renderPlanMgmt() {
            document.getElementById('exPickerList').innerHTML = db.ex.map(e => `
                <div class="flex-row ex-list-item">
                    <span>${e.name} <small>(${e.group})</small></span>
                    <input type="checkbox" value="${e.id}" class="plan-ex-checkbox" style="width: 25px; height: 25px; margin:0;">
                </div>
            `).join('');

            document.getElementById('planListContainer').innerHTML = db.plans.map((p, i) => `
                <div class="card flex-row">
                    <div><strong>${p.name}</strong><br><small>${p.exIds.length} Übungen</small></div>
                    <button class="danger-btn" onclick="deletePlan(${i})">Löschen</button>
                </div>
            `).join('');
        }

        function savePlan() {
            const name = document.getElementById('newPlanName').value;
            const selectedBoxes = document.querySelectorAll('.plan-ex-checkbox:checked');
            const exIds = Array.from(selectedBoxes).map(box => parseInt(box.value));
            
            if(!name || exIds.length === 0) return alert("Bitte Namen eingeben und mindestens 1 Übung wählen.");
            
            db.plans.push({ id: Date.now(), name, exIds });
            saveDB(); 
            document.getElementById('newPlanName').value = '';
            renderPlanMgmt();
            alert("Plan gespeichert!");
        }
        function deletePlan(i) { if(confirm("Plan löschen?")) { db.plans.splice(i, 1); saveDB(); renderPlanMgmt(); } }

        // --- 3. TRAINING ABSOLVIEREN ---
        function renderStartPlans() {
            const container = document.getElementById('startPlanList');
            if(db.plans.length === 0) { container.innerHTML = "<p>Bitte erstelle zuerst einen Plan.</p>"; return; }
            container.innerHTML = db.plans.map(p => `
                <button class="main-btn" onclick="startWorkout(${p.id})">${p.name} starten</button>
            `).join('');
        }

        function startWorkout(planId) {
            const plan = db.plans.find(p => p.id === planId);
            document.getElementById('currentPlanTitle').innerText = plan.name;
            document.getElementById('activeExercises').innerHTML = ''; // Clear old
            
            // Generiere Übungen
            plan.exIds.forEach(id => {
                const ex = db.ex.find(e => e.id === id);
                if(ex) renderWorkoutExercise(ex);
            });

            // Fülle Dropdown für spontane Übungen
            document.getElementById('spontaneousSelect').innerHTML = 
                '<option value="">Übung wählen...</option>' + 
                db.ex.map(e => `<option value="${e.id}">${e.name}</option>`).join('');

            nav('workout-active');
        }

        function renderWorkoutExercise(ex) {
            const container = document.getElementById('activeExercises');
            const exDiv = document.createElement('div');
            exDiv.className = 'card workout-ex-card';
            exDiv.dataset.id = ex.id;
            
            exDiv.innerHTML = `
                <div class="flex-row" style="margin-bottom: 15px;">
                    ${ex.img ? `<img src="${ex.img}" class="img-preview">` : ''}
                    <div style="flex:1">
                        <h3 style="margin:0">${ex.name}</h3>
                        <small style="color:var(--secondary)">${ex.group}</small>
                    </div>
                </div>
                
                <div class="sets-wrapper">
                    <div class="set-row">
                        <span class="set-label">SATZ 1</span>
                        <input type="number" placeholder="kg" class="w-input">
                        <input type="number" placeholder="12" value="12" class="r-input">
                    </div>
                    <div class="set-row">
                        <span class="set-label">SATZ 2</span>
                        <input type="number" placeholder="kg" class="w-input">
                        <input type="number" placeholder="10" value="10" class="r-input">
                    </div>
                    <div class="set-row">
                        <span class="set-label">SATZ 3</span>
                        <input type="number" placeholder="kg" class="w-input">
                        <input type="number" placeholder="8" value="8" class="r-input">
                    </div>
                </div>
                
                <button class="sec-btn" onclick="addWorkoutSet(this)">+ Satz hinzufügen (8 Wdh)</button>
                <textarea placeholder="Notizen zu dieser Übung..." class="note-input"></textarea>
            `;
            container.appendChild(exDiv);
        }

        function addWorkoutSet(btn) {
            const wrapper = btn.previousElementSibling;
            const setNum = wrapper.children.length + 1;
            const newSet = document.createElement('div');
            newSet.className = 'set-row';
            newSet.innerHTML = `
                <span class="set-label">SATZ ${setNum}</span>
                <input type="number" placeholder="kg" class="w-input">
                <input type="number" placeholder="8" value="8" class="r-input">
            `;
            wrapper.appendChild(newSet);
        }

        function addSpontaneousEx() {
            const select = document.getElementById('spontaneousSelect');
            const exId = parseInt(select.value);
            if(!exId) return;
            const ex = db.ex.find(e => e.id === exId);
            if(ex) {
                renderWorkoutExercise(ex);
                select.value = ""; // Reset
                window.scrollTo(0, document.body.scrollHeight); // Nach unten scrollen
            }
        }

        function finishWorkout() {
            const date = new Date().toLocaleDateString('de-DE');
            const workoutData = { date, exercises: [] };

            document.querySelectorAll('.workout-ex-card').forEach(card => {
                const exId = parseInt(card.dataset.id);
                const note = card.querySelector('.note-input').value;
                const sets = [];
                
                card.querySelectorAll('.set-row').forEach(row => {
                    const weight = row.querySelector('.w-input').value;
                    const reps = row.querySelector('.r-input').value;
                    if(weight || reps) { // Nur Sätze speichern, bei denen etwas eingetragen wurde
                        sets.push({ weight, reps });
                    }
                });

                if(sets.length > 0) {
                    workoutData.exercises.push({ exId, note, sets });
                }
            });

            if(workoutData.exercises.length === 0) return alert("Du hast keine Daten eingetragen.");

            db.logs.push(workoutData);
            saveDB();
            alert("Training erfolgreich gespeichert! Stark gemacht.");
            nav('home');
        }

        // --- 4. ANALYSE ---
        function renderAnalysis() {
            // Muskelgruppen zählen
            const stats = {};
            let totalWorkouts = db.logs.length;
            
            db.logs.forEach(log => {
                log.exercises.forEach(logEx => {
                    const exData = db.ex.find(e => e.id === logEx.exId);
                    if(exData) {
                        stats[exData.group] = (stats[exData.group] || 0) + 1;
                    }
                });
            });

            // Finde Maximum für die Balkengrafik
            const maxCount = Math.max(...Object.values(stats), 1);

            let statsHtml = `<p><strong>Absolvierte Trainings: ${totalWorkouts}</strong></p><h4>Fokus (Trainierte Übungen):</h4>`;
            for(const [group, count] of Object.entries(stats)) {
                const percent = (count / maxCount) * 100;
                statsHtml += `
                    <div style="margin-bottom: 10px;">
                        <div style="display:flex; justify-content:space-between; font-size: 12px;">
                            <span>${group}</span><span>${count}x</span>
                        </div>
                        <div class="stat-bar-bg"><div class="stat-bar-fill" style="width: ${percent}%;"></div></div>
                    </div>
                `;
            }
            document.getElementById('analysisStats').innerHTML = Object.keys(stats).length ? statsHtml : "<p>Noch keine Daten vorhanden.</p>";

            // Verlauf Rendern
            document.getElementById('logHistory').innerHTML = [...db.logs].reverse().map((log, index) => {
                const realIndex = db.logs.length - 1 - index;
                return `
                <div class="card flex-row">
                    <div>
                        <strong>${log.date}</strong><br>
                        <small style="color:var(--secondary)">${log.exercises.length} Übungen absolviert</small>
                    </div>
                    <button class="danger-btn" onclick="deleteLog(${realIndex})">Löschen</button>
                </div>
            `}).join('');
        }
        function deleteLog(i) { if(confirm("Training aus Verlauf löschen?")) { db.logs.splice(i, 1); saveDB(); renderAnalysis(); } }

        // --- 5. KÖRPERGEWICHT ---
        function renderWeight() {
            document.getElementById('weightDate').valueAsDate = new Date();
            const container = document.getElementById('weightList');
            if(db.weight.length === 0) { container.innerHTML = "<p>Keine Einträge.</p>"; return; }

            // Sortieren nach Datum (neueste zuerst)
            const sortedWeights = [...db.weight].sort((a,b) => new Date(b.date) - new Date(a.date));

            container.innerHTML = sortedWeights.map(w => {
                // Finde den originalen Index zum Löschen
                const origIndex = db.weight.indexOf(w);
                return `
                <div class="card flex-row" style="padding: 12px 18px;">
                    <div><span style="color:var(--secondary); font-size:12px;">${new Date(w.date).toLocaleDateString('de-DE')}</span><br>
                    <strong style="font-size:18px;">${w.val} kg</strong></div>
                    <button class="danger-btn" onclick="deleteWeight(${origIndex})">X</button>
                </div>
            `}).join('');
        }

        function saveWeight() {
            const val = document.getElementById('weightVal').value;
            const date = document.getElementById('weightDate').value;
            if(val && date) { 
                db.weight.push({date, val}); 
                saveDB(); 
                document.getElementById('weightVal').value = '';
                renderWeight(); 
            }
        }
        function deleteWeight(i) { db.weight.splice(i, 1); saveDB(); renderWeight(); }

        // INIT
        window.onload = () => nav('home');
    </script>
</body>
</html>
