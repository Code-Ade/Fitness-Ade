<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fitness Pro 2.1</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        :root { --primary: #30D158; --bg: #000; --card: #1C1C1E; --text: #FFF; --secondary: #8E8E93; --danger: #FF453A; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, system-ui; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 50px; }
        
        .page { display: none; padding: 20px; animation: fadeIn 0.2s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        h1, h2, h3 { font-weight: 700; margin-bottom: 15px; }
        .card { background: var(--card); padding: 18px; border-radius: 16px; margin-bottom: 15px; border: 1px solid #2C2C2E; }

        .main-btn { background: var(--primary); color: #000; border: none; padding: 16px; border-radius: 12px; width: 100%; font-weight: bold; font-size: 16px; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .secondary-btn { background: #2C2C2E; color: var(--text); border: none; padding: 12px; border-radius: 10px; width: 100%; font-size: 14px; margin-top: 5px; cursor: pointer; }
        .danger-btn { background: var(--danger); color: white; border: none; padding: 8px; border-radius: 8px; font-size: 12px; }
        .back-btn { color: var(--primary); background: none; border: none; font-size: 16px; margin-bottom: 20px; padding: 0; cursor: pointer; }

        input, select, textarea { width: 100%; background: #2C2C2E; border: none; padding: 14px; border-radius: 10px; color: #fff; font-size: 16px; margin: 8px 0; border: 1px solid #3A3A3C; }
        
        .set-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 10px; align-items: center; }
        .set-num { font-size: 11px; color: var(--secondary); }
        
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #2C2C2E; }
        .img-preview { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; background: #333; }
        
        /* Bottom Navigation */
        .nav { position: fixed; bottom: 0; width: 100%; background: #111; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #333; }
        .nav-item { background: none; border: none; color: var(--secondary); font-size: 10px; text-align: center; }
        .nav-item.active { color: var(--primary); }
    </style>
</head>
<body>

    <div id="page-home" class="page active">
        <h1>Fitness Pro</h1>
        <button class="main-btn" onclick="showPage('workout-select')"><span>▶️</span> Training starten</button>
        
        <div class="card">
            <h3>Konfiguration</h3>
            <button class="secondary-btn" onclick="showPage('exercise-lib')">💪 Übungen verwalten</button>
            <button class="secondary-btn" onclick="showPage('create-plan')">📋 Pläne verwalten</button>
            <button class="secondary-btn" onclick="showPage('weight-track')">⚖️ Körpergewicht</button>
        </div>
    </div>

    <div id="page-exercise-lib" class="page">
        <button class="back-btn" onclick="showPage('home')">← Zurück</button>
        <h2>Bibliothek</h2>
        <button class="main-btn" onclick="openExerciseModal()">+ Neue Übung</button>
        <div id="libContainer"></div>
    </div>

    <div id="page-weight-track" class="page">
        <button class="back-btn" onclick="showPage('home')">← Zurück</button>
        <h2>Körpergewicht</h2>
        <div class="card">
            <input type="date" id="wDate">
            <input type="number" id="wVal" step="0.1" placeholder="Gewicht in kg">
            <button class="main-btn" onclick="saveWeight()">Speichern</button>
        </div>
        <div id="weightHistory"></div>
    </div>

    <div id="page-workout-active" class="page">
        <h2 id="activePlanTitle">Training</h2>
        <div id="activeWorkoutContent"></div>
        <button class="secondary-btn" onclick="addSpontaneousExercise()">➕ Spontane Übung</button>
        <button class="main-btn" onclick="finishWorkout()" style="margin-top: 20px;">Session beenden</button>
    </div>

    <div id="page-analysis" class="page">
        <h1>Analyse</h1>
        <div class="card" id="statsOverview">
            <p>Lade Statistiken...</p>
        </div>
        <h3>Vergangene Trainings</h3>
        <div id="historyContainer"></div>
    </div>

    <nav class="nav">
        <button class="nav-item active" onclick="showPage('home')">🏠<br>Home</button>
        <button class="nav-item" onclick="showPage('analysis'); renderAnalysis();">📈<br>Analyse</button>
    </nav>

    <script>
        let db = JSON.parse(localStorage.getItem('fitDB_v2')) || { exercises: [], plans: [], logs: [], weight: [] };
        function saveDB() { localStorage.setItem('fitDB_v2', JSON.stringify(db)); }

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-' + id).classList.add('active');
            if(id === 'exercise-lib') renderLibrary();
            if(id === 'weight-track') renderWeightHistory();
            if(id === 'workout-select') renderPlanSelection(); // (Funktion aus Vorversion)
        }

        // --- BIBLIOTHEK LOGIK ---
        function renderLibrary() {
            const container = document.getElementById('libContainer');
            container.innerHTML = db.exercises.map((ex, idx) => `
                <div class="card list-item">
                    <img src="${ex.img || ''}" class="img-preview">
                    <div style="flex:1; margin-left:15px;">
                        <strong>${ex.name}</strong><br><small>${ex.group}</small>
                    </div>
                    <button class="danger-btn" onclick="deleteEx(${idx})">Löschen</button>
                </div>
            `).join('');
        }

        function openExerciseModal() {
            const name = prompt("Name der Übung:");
            const group = prompt("Muskelgruppe (Beine, Brust, Rücken, Bizeps, Trizeps, Schultern, Bauch):");
            if(name && group) {
                db.exercises.push({ id: Date.now(), name, group, img: null });
                saveDB(); renderLibrary();
            }
        }

        function deleteEx(idx) { if(confirm("Löschen?")) { db.exercises.splice(idx, 1); saveDB(); renderLibrary(); } }

        // --- GEWICHT LOGIK ---
        function saveWeight() {
            const date = document.getElementById('wDate').value || new Date().toISOString().split('T')[0];
            const val = document.getElementById('wVal').value;
            if(val) {
                db.weight.unshift({ date, val });
                saveDB(); renderWeightHistory();
            }
        }

        function renderWeightHistory() {
            document.getElementById('wDate').valueAsDate = new Date();
            const container = document.getElementById('weightHistory');
            container.innerHTML = "<h3>Verlauf</h3>" + db.weight.map((w, idx) => `
                <div class="list-item"><span>${w.date}</span> <strong>${w.val} kg</strong> 
                <button class="danger-btn" onclick="deleteWeight(${idx})">X</button></div>
            `).join('');
        }
        function deleteWeight(idx) { db.weight.splice(idx, 1); saveDB(); renderWeightHistory(); }

        // --- TRAINING LOGIK (Optimierte Sätze) ---
        function addExerciseToWorkoutView(ex) {
            const container = document.getElementById('activeWorkoutContent');
            const exDiv = document.createElement('div');
            exDiv.className = 'card';
            exDiv.innerHTML = `
                <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px;">
                    <img src="${ex.img || ''}" class="img-preview">
                    <strong>${ex.name}</strong>
                </div>
                <div class="sets-container" data-exid="${ex.id}">
                    ${renderSetRow(1, 12)}
                    ${renderSetRow(2, 10)}
                    ${renderSetRow(3, 8)}
                </div>
                <button class="secondary-btn" onclick="addCustomSet(this)">+ Satz hinzufügen</button>
                <textarea placeholder="Notiz..." class="n-in"></textarea>
            `;
            container.appendChild(exDiv);
        }

        function renderSetRow(num, defReps) {
            return `
                <div class="set-row">
                    <span class="set-num">SATZ ${num}</span>
                    <input type="number" placeholder="kg" class="w-in">
                    <input type="number" placeholder="${defReps}" class="r-in" value="${defReps}">
                </div>
            `;
        }

        function addCustomSet(btn) {
            const container = btn.previousElementSibling;
            const num = container.children.length + 1;
            container.insertAdjacentHTML('beforeend', renderSetRow(num, 8));
        }

        // --- ANALYSE LOGIK ---
        function renderAnalysis() {
            const overview = document.getElementById('statsOverview');
            const history = document.getElementById('historyContainer');
            
            // Muskelgruppen Zählen
            const groups = {};
            db.logs.forEach(log => {
                log.entries.forEach(e => {
                    const ex = db.exercises.find(ex => ex.id == e.exId);
                    if(ex) groups[ex.group] = (groups[ex.group] || 0) + 1;
                });
            });

            overview.innerHTML = "<h4>Muskel-Fokus</h4>" + Object.entries(groups)
                .map(([name, count]) => `<div>${name}: ${count} Übungen</div>`).join('');

            history.innerHTML = db.logs.map((log, idx) => `
                <div class="card">
                    <strong>${new Date(log.date).toLocaleDateString()}</strong> - ${log.planId ? 'Plan Training' : 'Spontan'}
                    <button class="danger-btn" style="float:right" onclick="deleteLog(${idx})">Löschen</button>
                </div>
            `).join('');
        }

        function deleteLog(idx) { if(confirm("Training aus Verlauf löschen?")) { db.logs.splice(idx, 1); saveDB(); renderAnalysis(); } }

        // Hilfsfunktionen für Planwahl
        function renderPlanSelection() {
            const container = document.getElementById('page-workout-select');
            container.innerHTML = '<button class="back-btn" onclick="showPage(\'home\')">← Zurück</button><h2>Plan wählen</h2>' + 
                db.plans.map(p => `<button class="main-btn" onclick="startWorkoutSession('${p.id}')">${p.name}</button>`).join('');
        }
        
        window.onload = () => showPage('home');
    </script>
</body>
</html>
