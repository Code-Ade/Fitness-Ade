<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TrackyFit 9.3</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://via.placeholder.com/180/30D158/000000?text=TF">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #30D158; --bg: #000000; --card: #1C1C1E; --text: #FFFFFF; --secondary: #8E8E93; --danger: #FF453A; --accent: #0A84FF; --warning: #FF9F0A; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; padding-top: env(safe-area-inset-top); padding-bottom: calc(100px + env(safe-area-inset-bottom)); }
        .page { display: none; padding: 20px; animation: fadeIn 0.2s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .card { background: var(--card); padding: 18px; border-radius: 16px; margin-bottom: 15px; border: 1px solid #2C2C2E; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .main-btn { background: var(--primary); color: #000; border: none; padding: 16px; border-radius: 12px; width: 100%; font-weight: bold; font-size: 16px; margin-bottom: 10px; cursor: pointer; }
        .sec-btn { background: #2C2C2E; color: #FFF; border: none; padding: 12px; border-radius: 10px; width: 100%; margin-top: 5px; cursor: pointer; }
        .danger-btn { background: var(--danger); color: white; border: none; padding: 8px 12px; border-radius: 8px; font-size: 12px; }
        .edit-btn { background: var(--accent); color: white; border: none; padding: 8px 12px; border-radius: 8px; font-size: 12px; }
        input, select, textarea { width: 100%; background: #2C2C2E; border: 1px solid #3A3A3C; padding: 12px; border-radius: 10px; color: #fff; margin: 8px 0; font-size: 16px; }
        .nav { position: fixed; bottom: 0; width: 100%; background: rgba(28, 28, 30, 0.95); backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 15px 0 calc(10px + env(safe-area-inset-bottom)); border-top: 1px solid #3A3A3C; z-index: 999; }
        .nav-item { background: none; border: none; color: var(--secondary); font-size: 11px; display: flex; flex-direction: column; align-items: center; }
        .nav-item.active { color: var(--primary); }
        .set-row { display: grid; grid-template-columns: 40px 1fr 1fr 40px; gap: 8px; align-items: center; margin-bottom: 4px; }
        .cardio-row { display: grid; grid-template-columns: 1fr 1fr 1fr 40px; gap: 8px; align-items: center; margin-bottom: 4px; }
        .last-val { font-size: 11px; color: var(--primary); display: block; margin-bottom: 12px; margin-top: -2px; padding-left: 48px; }
        .img-pre { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; background: #333; }
        .chart-wrap { height: 180px; width: 100%; margin-top: 10px; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .sort-item { display: flex; align-items: center; justify-content: space-between; background: #2C2C2E; padding: 8px 12px; border-radius: 8px; margin-bottom: 5px; font-size: 14px; }
    </style>
</head>
<body>

    <div id="page-home" class="page active">
        <h1 style="color: var(--primary)">TrackyFit <small style="color: var(--secondary); font-size: 14px;">9.3</small></h1>
        <div id="backup-reminder" class="card" style="display:none; border-color: var(--warning);"><p style="margin:0 0 10px 0; color: var(--warning);">⚠️ Zeit für ein Backup!</p><button class="sec-btn" onclick="nav('settings')">Zu den Einstellungen</button></div>
        <div id="resume-banner" class="card" style="display:none; border-color: var(--accent);"><p style="margin:0 0 10px 0">⚠️ Offenes Training gefunden!</p><button class="main-btn" style="background: var(--accent)" onclick="resumeWorkout()">Fortsetzen</button><button class="sec-btn" onclick="discardTemp()">Verwerfen</button></div>
        <button class="main-btn" onclick="nav('workout-select')">▶️ Training starten</button>
        <div class="card"><h3>Verwaltung</h3><button class="sec-btn" onclick="nav('ex-lib')">💪 Übungen & Fotos</button><button class="sec-btn" onclick="nav('plan-mgmt')">📋 Trainingspläne</button><button class="sec-btn" onclick="nav('weight')">⚖️ Körpergewicht</button></div>
    </div>

    <div id="page-workout-active" class="page">
        <h2 id="activeTitle">Workout</h2>
        <div class="card">
            <label style="font-size: 12px; color: var(--secondary)">Trainingstag anpassen:</label>
            <input type="date" id="workoutDateInput">
        </div>
        <div id="activeContent"></div>
        <div class="card" style="border-style: dashed; border-color: var(--secondary);"><select id="spontSelect"></select><button class="sec-btn" onclick="addSpontEx()">+ Hinzufügen</button><hr style="border:0; border-top:1px solid #333; margin: 15px 0;"><button class="sec-btn" style="color: var(--warning)" onclick="showQuickAddEx()">+ Neue Übung erstellen</button></div>
        <button class="main-btn" onclick="finishWorkout()" style="margin-top: 20px;">✅ Training beenden</button>
    </div>

    <div id="page-weight" class="page">
        <button class="sec-btn" onclick="nav('home')">← Zurück</button>
        <h2 id="weightTitle">Körpergewicht</h2>
        <div class="card">
            <input type="date" id="wD">
            <input type="number" id="wV" step="0.1" placeholder="kg">
            <button class="main-btn" id="weightSaveBtn" onclick="saveWeight()">Speichern</button>
            <button class="sec-btn" id="weightCancelBtn" style="display:none" onclick="resetWeightForm()">Abbrechen</button>
        </div>
        <div id="wList"></div>
    </div>

    <div id="page-analysis" class="page">
        <h1>Analyse</h1>
        <div id="analyticsDashboard"></div>
        <h3 style="margin-top: 30px;">Verlauf</h3>
        <div id="historyLogs"></div>
    </div>

    <div id="page-settings" class="page"><h1>Einstellungen</h1><div class="card"><h3>💾 Backup</h3><button class="main-btn" onclick="exportData()">📤 Backup speichern (JSON)</button><input type="file" id="importFile" accept=".json" onchange="importData()"><label>Backup-Intervall (Tage):</label><input type="number" id="backupInt" onchange="updateBackupInterval()"></div></div>
    <div id="page-ex-lib" class="page"><button class="sec-btn" onclick="nav('home')">← Zurück</button><h2 id="exFormTitle">Neue Übung</h2><div class="card"><input id="exN" placeholder="Name"><select id="exG"><option>Brust</option><option>Rücken</option><option>Beine</option><option>Schultern</option><option>Bizeps</option><option>Trizeps</option><option>Bauch</option><option>Cardio</option></select><select id="exType"><option value="kraft">Kraft</option><option value="bw">Bodyweight</option><option value="cardio">Cardio</option></select><input type="file" id="exF" accept="image/*"><button class="main-btn" onclick="addEx()">Speichern</button></div><div id="exL"></div></div>
    <div id="page-plan-mgmt" class="page"><button class="sec-btn" onclick="nav('home')">← Zurück</button><h2>Pläne</h2><div class="card"><input id="plN" placeholder="Plan Name"><div id="plPick"></div><div id="plSortArea"></div><button class="main-btn" onclick="savePl()">Speichern</button></div><div id="plL"></div></div>
    <div id="page-workout-select" class="page"><button class="sec-btn" onclick="nav('home')">← Zurück</button><h2>Wähle Plan</h2><button class="main-btn" onclick="initFreeWorkout()">⚡ Freies Training</button><div id="selL"></div></div>

    <nav class="nav">
        <button class="nav-item" onclick="nav('home')">🏠<br>Home</button>
        <button class="nav-item" onclick="nav('analysis')">📈<br>Analyse</button>
        <button class="nav-item" onclick="nav('settings')">⚙️<br>Settings</button>
    </nav>

    <script>
        let db = JSON.parse(localStorage.getItem('trackyfit_db')) || { settings:{}, ex:[], plans:[], logs:[], weight:[] };
        let editingLogIndex = null; let editingExId = null; let editingPlanId = null; let editingWeightIndex = null;
        let tempSelectedExIds = [];

        function initApp() {
            if(!db.settings) db.settings = { primary: '#30D158', accent: '#0A84FF', bg: '#000000', backupInt: 7, lastBackup: Date.now() };
            applyTheme(); nav('home');
        }
        function save() { localStorage.setItem('trackyfit_db', JSON.stringify(db)); }
        function applyTheme() { document.documentElement.style.setProperty('--primary', db.settings.primary); document.getElementById('backupInt').value = db.settings.backupInt; }
        function updateBackupInterval() { db.settings.backupInt = parseInt(document.getElementById('backupInt').value); save(); }
        function nav(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.getElementById('page-' + id).classList.add('active');
            if(id === 'home') checkTemp(); if(id === 'weight') renderWeight(); if(id === 'analysis') renderAnalysis(); if(id === 'ex-lib') renderExLib(); if(id === 'plan-mgmt') renderPlanMgmt(); if(id === 'workout-select') renderPlanChoice();
        }

        // --- GEWICHT BEARBEITEN ---
        function renderWeight() {
            db.weight.sort((a,b)=>new Date(b.date)-new Date(a.date));
            document.getElementById('wList').innerHTML = db.weight.map((w, i) => `
                <div class="card flex-between">
                    <div><strong>${formatDateDe(w.date)}</strong><br><span>${w.val} kg</span></div>
                    <div>
                        <button class="edit-btn" onclick="editWeight(${i})">Edit</button>
                        <button class="danger-btn" onclick="deleteWeight(${i})">X</button>
                    </div>
                </div>`).join('');
        }
        function saveWeight() {
            const date = document.getElementById('wD').value; const val = document.getElementById('wV').value;
            if(!date || !val) return;
            if(editingWeightIndex !== null) {
                db.weight[editingWeightIndex] = { date, val };
            } else {
                db.weight.push({ date, val });
            }
            save(); resetWeightForm(); renderWeight();
        }
        function editWeight(i) {
            editingWeightIndex = i; const w = db.weight[i];
            document.getElementById('wD').value = w.date; document.getElementById('wV').value = w.val;
            document.getElementById('weightTitle').innerText = "Gewicht bearbeiten";
            document.getElementById('weightSaveBtn').innerText = "Update";
            document.getElementById('weightCancelBtn').style.display = "block";
        }
        function resetWeightForm() {
            editingWeightIndex = null; document.getElementById('wD').value = ''; document.getElementById('wV').value = '';
            document.getElementById('weightTitle').innerText = "Körpergewicht";
            document.getElementById('weightSaveBtn').innerText = "Speichern";
            document.getElementById('weightCancelBtn').style.display = "none";
        }
        function deleteWeight(i) { if(confirm("Löschen?")) { db.weight.splice(i,1); save(); renderWeight(); } }

        // --- TRAINING START/EDIT MIT DATUM ---
        function startWorkoutLogic(title, exercises, dateStr = null) {
            document.getElementById('activeTitle').innerText = title; 
            const dateInput = document.getElementById('workoutDateInput');
            // Wenn dateStr existiert (beim Editieren), nimm das, sonst heute
            dateInput.value = dateStr ? dateStr : new Date().toISOString().split('T')[0];
            
            const cont = document.getElementById('activeContent'); cont.innerHTML = '';
            document.getElementById('spontSelect').innerHTML = '<option value="">Übung hinzufügen...</option>' + db.ex.map(e => `<option value="${e.id}">${e.name}</option>`).join('');
            exercises.forEach(exObj => renderExCard(exObj)); nav('workout-active');
        }
        function editPastLog(index) {
            editingLogIndex = index; const log = db.logs[index];
            // Datum konvertieren von DD.MM.YYYY zu YYYY-MM-DD für das Input-Feld
            const dateParts = log.date.split('.');
            const isoDate = `${dateParts[2]}-${dateParts[1]}-${dateParts[0]}`;
            const ex = log.exercises.map(e => ({ id: e.exId, sets: e.sets, note: e.note }));
            startWorkoutLogic("Edit: " + log.date, ex, isoDate);
        }
        function finishWorkout() {
            const inputDate = document.getElementById('workoutDateInput').value;
            const finalDateDe = formatDateDe(inputDate);
            const logs = []; document.querySelectorAll('.workout-card').forEach(card => {
                const sets = []; card.querySelectorAll('.set-row, .cardio-row').forEach(row => { sets.push({ w: row.querySelector('.w-in')?.value||'', r: row.querySelector('.r-in')?.value||'', min: row.querySelector('.min-in')?.value||'', hr: row.querySelector('.hr-in')?.value||'', int: row.querySelector('.int-in')?.value||'' }); });
                if(sets.length > 0) logs.push({ exId: card.dataset.id, sets, note: card.querySelector('.n-in').value });
            });
            if(logs.length === 0) return;
            const finalData = { date: finalDateDe, exercises: logs };
            if(editingLogIndex !== null) db.logs[editingLogIndex] = finalData; else db.logs.push(finalData);
            save(); discardTemp(); nav('home');
        }

        // --- HELFER ---
        function formatDateDe(dateStr) {
            if(!dateStr) return "";
            const d = new Date(dateStr);
            return `${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}.${d.getFullYear()}`;
        }

        // --- REST DER FUNKTIONEN (Sortierung, etc. wie 9.2) ---
        function renderPlanMgmt() {
            document.getElementById('plPick').innerHTML = db.ex.map(e => `<div><input type="checkbox" value="${e.id}" class="p-ck" onchange="syncSortList()" ${tempSelectedExIds.includes(e.id)?'checked':''}> ${e.name}</div>`).join('');
            renderSortList();
            document.getElementById('plL').innerHTML = db.plans.map(p => `<div class="card flex-between"><span>${p.name}</span><button onclick="editPl('${p.id}')">Edit</button></div>`).join('');
        }
        function syncSortList() {
            const checkedIds = Array.from(document.querySelectorAll('.p-ck:checked')).map(c => c.value);
            checkedIds.forEach(id => { if(!tempSelectedExIds.includes(id)) tempSelectedExIds.push(id); });
            tempSelectedExIds = tempSelectedExIds.filter(id => checkedIds.includes(id));
            renderSortList();
        }
        function renderSortList() {
            document.getElementById('plSortArea').innerHTML = tempSelectedExIds.map((id, i) => `
                <div class="sort-item"><span>${db.ex.find(e=>e.id==id)?.name}</span>
                <div><button onclick="moveItem(${i},-1)">↑</button><button onclick="moveItem(${i},1)">↓</button></div></div>`).join('');
        }
        function moveItem(i, d) { const n = i+d; if(n>=0 && n<tempSelectedExIds.length) { [tempSelectedExIds[i], tempSelectedExIds[n]] = [tempSelectedExIds[n], tempSelectedExIds[i]]; renderSortList(); } }
        function savePl() {
            const n = document.getElementById('plN').value; if(!n) return;
            const p = { id: editingPlanId || Date.now().toString(), name: n, exIds: [...tempSelectedExIds] };
            if(editingPlanId) db.plans[db.plans.findIndex(x=>x.id==editingPlanId)] = p; else db.plans.push(p);
            save(); tempSelectedExIds=[]; document.getElementById('plN').value=''; editingPlanId=null; renderPlanMgmt();
        }
        function editPl(id) { editingPlanId=id; const p=db.plans.find(x=>x.id==id); document.getElementById('plN').value=p.name; tempSelectedExIds=[...p.exIds]; renderPlanMgmt(); }

        function renderExCard(exObj) {
            const exBase = db.ex.find(e => e.id == exObj.id); if(!exBase) return;
            const lastSets = db.logs.filter(l => l.exercises.some(e => e.exId == exObj.id)).reverse()[0]?.exercises.find(e => e.exId == exObj.id).sets;
            const div = document.createElement('div'); div.className = 'card workout-card'; div.dataset.id = exObj.id;
            let sHtml = `<div class="s-wrap">`;
            exObj.sets.forEach((s, i) => {
                let lStr = '-'; if (lastSets && lastSets[i]) lStr = exBase.type==='kraft' ? `${lastSets[i].w}kg x ${lastSets[i].r}` : `${lastSets[i].r} Reps`;
                if(exBase.type==='cardio') sHtml += `<div class="cardio-row"><input type="number" value="${s.min||''}" placeholder="Min" class="min-in"><input type="number" value="${s.hr||''}" placeholder="BPM" class="hr-in"><input type="text" value="${s.int||''}" placeholder="Int" class="int-in"><button onclick="this.parentElement.remove()">X</button></div>`;
                else sHtml += `<div class="set-row"><span>S${i+1}</span><input type="number" value="${s.w||''}" placeholder="kg" class="w-in" ${exBase.type==='bw'?'style="display:none"':''}><input type="number" value="${s.r||''}" placeholder="R" class="r-in"><button onclick="this.parentElement.remove()">X</button></div><span class="last-val">${lStr}</span>`;
            });
            div.innerHTML = `<strong>${exBase.name}</strong>${sHtml}</div><button class="sec-btn" onclick="addSetUI(this, '${exBase.type}')">+ Satz</button><textarea class="n-in" placeholder="Notiz...">${exObj.note||''}</textarea>`;
            document.getElementById('activeContent').appendChild(div);
        }
        function addSetUI(btn, type) { 
            const wrap = btn.parentElement.querySelector('.s-wrap');
            if(type==='kraft') wrap.insertAdjacentHTML('beforeend', `<div class="set-row"><span>S+</span><input type="number" placeholder="kg" class="w-in"><input type="number" placeholder="R" class="r-in"><button onclick="this.parentElement.remove()">X</button></div>`);
            else if(type==='bw') wrap.insertAdjacentHTML('beforeend', `<div class="set-row"><span>S+</span><input type="number" placeholder="R" class="r-in"><button onclick="this.parentElement.remove()">X</button></div>`);
            else wrap.insertAdjacentHTML('beforeend', `<div class="cardio-row"><input type="number" placeholder="Min" class="min-in"><input type="number" placeholder="BPM" class="hr-in"><input type="text" placeholder="Int" class="int-in"><button onclick="this.parentElement.remove()">X</button></div>`);
        }
        function initNewWorkout(id) { const p = db.plans.find(x=>x.id==id); startWorkoutLogic(p.name, p.exIds.map(id=>({id, sets:db.ex.find(e=>e.id==id).type==='kraft'?[{w:'',r:'12'},{w:'',r:'10'},{w:'',r:'8'}]:[{r:'12'},{r:'12'},{r:'12'}], note:''}))); }
        function initFreeWorkout() { startWorkoutLogic("Freies Training", []); }
        function addSpontEx() { const id = document.getElementById('spontSelect').value; if(id) renderExCard({id, sets:db.ex.find(e=>e.id==id).type==='kraft'?[{w:'',r:'12'},{w:'',r:'10'},{w:'',r:'8'}]:[{r:'12'}], note:''}); }
        function renderPlanChoice() { document.getElementById('selL').innerHTML = db.plans.map(p => `<button class="main-btn" onclick="initNewWorkout('${p.id}')">${p.name}</button>`).join(''); }
        function renderExLib() { document.getElementById('exL').innerHTML = db.ex.map(e => `<div class="card">${e.name} (${e.type}) <button onclick="deleteEx('${e.id}')">X</button></div>`).join(''); }
        async function addEx() { const n = document.getElementById('exN').value; if(n) db.ex.push({id:Date.now().toString(), name:n, type:document.getElementById('exType').value, group:document.getElementById('exG').value}); save(); renderExLib(); }
        function deleteEx(id) { db.ex = db.ex.filter(x=>x.id!=id); save(); renderExLib(); }
        function renderAnalysis() {
            db.logs.sort((a,b) => b.date.split('.').reverse().join('').localeCompare(a.date.split('.').reverse().join('')));
            document.getElementById('historyLogs').innerHTML = db.logs.map((l, i) => `<div class="card flex-between"><span>${l.date}</span><div><button class="edit-btn" onclick="editPastLog(${i})">Edit</button><button class="danger-btn" onclick="deleteLog(${i})">X</button></div></div>`).join('');
        }
        function deleteLog(i) { db.logs.splice(i,1); save(); renderAnalysis(); }
        function exportData() { const blob = new Blob([JSON.stringify(db)], {type:'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download='trackyfit.json'; a.click(); }
        function importData() { const f = document.getElementById('importFile').files[0]; const r = new FileReader(); r.onload=(e)=>{ db=JSON.parse(e.target.result); save(); location.reload(); }; r.readAsText(f); }
        function checkTemp() { const t = localStorage.getItem('activeSession_temp'); document.getElementById('resume-banner').style.display = t ? 'block' : 'none'; }
        function discardTemp() { localStorage.removeItem('activeSession_temp'); checkTemp(); }

        window.onload = initApp;
    </script>
</body>
</html>
